<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Outside Time 🌿</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
:root { --accent:#7aa87a; }

body {
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:linear-gradient(#eef2ee,#f7f4ef);
  color:#4f6f52;
}

/* texture */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(200,220,200,0.2), transparent),
    radial-gradient(circle at 80% 70%, rgba(220,200,200,0.15), transparent);
  z-index:-1;
}

/* container */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* tabs */
.tabs{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
}

.tab{
  padding:6px 12px;
  border-radius:14px;
  border:none;
  background:#e8efe8;
  cursor:pointer;
}

.tab.active{
  background:var(--accent);
  color:white;
}

/* layout */
.main{
  display:grid;
  grid-template-columns:260px 1fr;
  gap:20px;
  margin-top:10px;
}

/* side */
.side{
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:20px;
}

/* card */
.card{
  background:white;
  border-radius:30px;
  padding:30px;
  position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,0.06);
  overflow:hidden;
}

/* window glow */
.card::before{
  content:"";
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:70%;
  height:140px;
  background:radial-gradient(circle,#ffffff,transparent);
  opacity:0.5;
}

/* title */
h1{
  text-align:center;
  font-family:'Playfair Display',serif;
  font-size:34px;
}

/* subtitle */
.subtitle{
  text-align:center;
  opacity:0.6;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:14px;
  margin-top:20px;
}

/* days */
.day{
  width:44px;
  height:44px;
  border-radius:50%;
  border:2px solid var(--accent);
  background:#fff;
  cursor:pointer;
  transition:0.25s;
}

.day.checked{
  background:var(--accent);
  transform:scale(1.12);
  box-shadow:0 0 15px var(--accent);
}

/* illustration */
#illustration{
  position:absolute;
  bottom:10px;
  right:10px;
  width:130px;
  opacity:0.9;
}

/* sparkles */
.sparkle{
  position:absolute;
  width:8px;
  height:8px;
  background:#e6efe6;
  border-radius:50%;
  animation:float 8s infinite;
}

@keyframes float{
  0%{transform:translateY(0);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-120px);opacity:0;}
}

/* notes */
.notes{
  margin-top:15px;
  background:rgba(255,255,255,0.6);
  border-radius:20px;
  padding:20px;
}

textarea{
  width:100%;
  border-radius:12px;
  border:none;
  padding:10px;
  margin-top:8px;
  background:#f6f9f6;
}
</style>
</head>

<body>

<div class="container">

<div class="sparkle" style="left:15%; top:90%;"></div>
<div class="sparkle" style="left:60%; top:95%; animation-delay:2s;"></div>
<div class="sparkle" style="left:80%; top:85%; animation-delay:4s;"></div>

<div class="tabs" id="tabs"></div>

<div class="main">

<div class="side">
  <h3>🌿 Insights</h3>
  <p id="insight"></p>

  <label><input type="checkbox" id="togglePercent"> show %</label>
  <p id="percent"></p>

  <h3>💛 Mood</h3>
  <button onclick="setMood('gentle')">gentle</button>
  <button onclick="setMood('tired')">tired</button>
  <button onclick="setMood('motivated')">motivated</button>
  <p id="message"></p>
</div>

<div class="card">
  <h1 id="monthTitle"></h1>
  <p class="subtitle">I went outside for at least 15 minutes</p>

  <div class="grid" id="grid"></div>

  <div id="illustration"></div>
</div>

</div>

<div class="notes">
  <h3>📚 What I'm reading</h3>
  <textarea id="reading"></textarea>

  <h3>🎵 Songs on repeat</h3>
  <textarea id="songs"></textarea>

  <h3>🌸 Today I choose me</h3>
  <textarea id="habits"></textarea>
</div>

</div>

<script>
const months=[
{name:"April",days:30,accent:"#7fa7c2"},
{name:"May",days:31,accent:"#7aa87a"},
{name:"June",days:30,accent:"#e0b96b"},
{name:"July",days:31,accent:"#d97b7b"},
{name:"August",days:31,accent:"#c9a86a"},
{name:"September",days:30,accent:"#b8895e"},
{name:"October",days:31,accent:"#d47a2a"},
{name:"November",days:30,accent:"#8c6f5a"},
{name:"December",days:31,accent:"#5f8a6b"}
];

const illustrations={
April:`<svg viewBox="0 0 100 100"><path d="M20 50 Q50 20 80 50" stroke="#7fa7c2" fill="none"/><line x1="40" y1="60" x2="40" y2="80" stroke="#7fa7c2"/><line x1="60" y1="60" x2="60" y2="80" stroke="#7fa7c2"/></svg>`,
May:`<svg viewBox="0 0 100 100"><circle cx="50" cy="60" r="12" fill="#a8d5a8"/><ellipse cx="50" cy="40" rx="15" ry="20" fill="#bde5bd"/></svg>`,
June:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="15" fill="#ffe08a"/></svg>`,
July:`<svg viewBox="0 0 100 100"><ellipse cx="50" cy="60" rx="20" ry="12" fill="#ff9b9b"/></svg>`,
August:`<svg viewBox="0 0 100 100"><line x1="50" y1="30" x2="50" y2="80" stroke="#c9a86a"/><ellipse cx="50" cy="40" rx="10" ry="15" fill="#e8d4a2"/></svg>`,
September:`<svg viewBox="0 0 100 100"><path d="M50 20 Q70 50 50 80 Q30 50 50 20" fill="#b8895e"/></svg>`,
October:`<svg viewBox="0 0 100 100"><circle cx="50" cy="60" r="18" fill="#d47a2a"/><rect x="45" y="35" width="10" height="15" fill="#7a4f2a"/></svg>`,
November:`<svg viewBox="0 0 100 100"><rect x="35" y="50" width="30" height="20" fill="#8c6f5a"/><circle cx="65" cy="55" r="8" fill="#c9b1a0"/></svg>`,
December:`<svg viewBox="0 0 100 100"><polygon points="50,20 70,60 30,60" fill="#5f8a6b"/><rect x="45" y="60" width="10" height="20" fill="#8c6f5a"/></svg>`
};

let currentMonth=0;
let currentYear=new Date().getFullYear();

const grid=document.getElementById("grid");
const tabs=document.getElementById("tabs");

months.forEach((m,i)=>{
let b=document.createElement("button");
b.innerText=m.name.slice(0,3);
b.className="tab";
b.onclick=()=>{currentMonth=i;render();}
tabs.appendChild(b);
});

function render(){
grid.innerHTML="";
const m=months[currentMonth];

document.documentElement.style.setProperty('--accent',m.accent);
document.getElementById("monthTitle").innerText=m.name+" "+currentYear;

document.getElementById("illustration").innerHTML=illustrations[m.name];

document.querySelectorAll(".tab").forEach((t,i)=>{
t.classList.toggle("active",i===currentMonth);
});

for(let i=1;i<=m.days;i++){
let btn=document.createElement("button");
btn.className="day";
btn.innerText=i;

let key=currentYear+"-"+currentMonth+"-"+i;

if(localStorage.getItem(key)==="true"){
btn.classList.add("checked");
}

btn.onclick=()=>{
btn.classList.toggle("checked");
localStorage.setItem(key,btn.classList.contains("checked"));
updateInsight();
};

grid.appendChild(btn);
}

updateInsight();
}

function updateInsight(){
let m=months[currentMonth];
let count=0;

for(let i=1;i<=m.days;i++){
if(localStorage.getItem(currentYear+"-"+currentMonth+"-"+i)==="true") count++;
}

document.getElementById("insight").innerText=
"You stepped outside "+count+" days 🌿";

let percent=Math.round((count/m.days)*100);
document.getElementById("percent").innerText=
document.getElementById("togglePercent").checked ? percent+"%" : "";
}

function setMood(m){
const msg={
gentle:"soft days matter 🌿",
tired:"rest counts too ☁️",
motivated:"steady growth ✨"
};
document.getElementById("message").innerText=msg[m];
}

["reading","songs","habits"].forEach(id=>{
let el=document.getElementById(id);
el.value=localStorage.getItem(id)||"";
el.oninput=()=>localStorage.setItem(id,el.value);
});

document.getElementById("togglePercent").onchange=updateInsight;

render();
</script>

</body>
</html>
