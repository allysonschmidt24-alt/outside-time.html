<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Outside Time 🌿</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
:root { --accent:#7aa87a; }

body {
  margin:0;
  font-family:'Quicksand',sans-serif;
  background:#f4f6f2;
  color:#4f6f52;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.tabs{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
}

.tab{
  padding:6px 10px;
  border:none;
  border-radius:10px;
  background:#e6eee6;
  cursor:pointer;
}

.tab.active{
  background:var(--accent);
  color:white;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  margin-top:15px;
}

h1{
  text-align:center;
  font-family:'Playfair Display',serif;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
  margin-top:15px;
}

.day{
  width:40px;
  height:40px;
  border-radius:50%;
  border:2px solid var(--accent);
  background:white;
  cursor:pointer;
}

.day.checked{
  background:var(--accent);
  color:white;
}

#illustration{
  margin-top:15px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="tabs" id="tabs"></div>

<div class="card">
  <h1 id="monthTitle"></h1>
  <div class="grid" id="grid"></div>
  <div id="illustration"></div>
</div>

</div>

<script>
const months=["April","May","June","July","August","September","October","November","December"];

const illustrations={
April:"🌧️",
May:"🌿",
June:"☀️",
July:"🍉",
August:"🌾",
September:"🍂",
October:"🎃",
November:"☕",
December:"🌲"
};

let currentMonth=0;

const tabs=document.getElementById("tabs");
const grid=document.getElementById("grid");

months.forEach((m,i)=>{
  let b=document.createElement("button");
  b.innerText=m.slice(0,3);
  b.className="tab";
  b.onclick=()=>{currentMonth=i;render();}
  tabs.appendChild(b);
});

function render(){
  grid.innerHTML="";

  document.getElementById("monthTitle").innerText=months[currentMonth];

  document.getElementById("illustration").innerText=illustrations[months[currentMonth]];

  document.querySelectorAll(".tab").forEach((t,i)=>{
    t.classList.toggle("active",i===currentMonth);
  });

  for(let i=1;i<=30;i++){
    let btn=document.createElement("button");
    btn.className="day";
    btn.innerText=i;

    btn.onclick=()=>btn.classList.toggle("checked");

    grid.appendChild(btn);
  }
}

render();
</script>

</body>
</html>
